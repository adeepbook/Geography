类型标签: [火山与板块]            # 红
一句话: 大洋板块俯冲到岛弧之下,熔出的岩浆一次次喷堆,叠出近乎完美的对称锥。
形成时间线:
  - 事件: 俯冲生成岩浆
    模块: 板块/汇聚/洋陆俯冲
    参数:
      背景: 日本岛弧下多板块俯冲
      产物: 弧岩浆上升
  - 事件: 熔岩与碎屑互层堆锥
    模块: 板块/火山/成层火山 + 岩石/火成/安山岩
    参数:
      岩性: 玄武质—安山质互层(富士偏玄武质,待核对)
      特点: 陡峭锥形
  - 事件: 现代锥体成形
    模块: 板块/火山/成层火山
    参数:
      阶段: 新富士火山
      时间: 约一万年来(待核对)
      最近喷发: 1707年宝永(待核对)
垂直拆解:
  天上: [气候/季风, 气候/海拔分带(雪线), 山体诱发的地形云]
  地面: [对称火山锥、火山碎屑坡、熔岩流、山麓堰塞湖]
  地下: [板块/汇聚/洋陆俯冲(下插板片), 岩浆房, 玄武—安山质熔岩与碎屑互层]
本地注解: >
  成层火山(stratovolcano)对比盾状火山:中酸性岩浆黏、喷发烈,熔岩与碎屑交替,
  堆出陡而对称的锥——富士山是范本。它脚下是大洋板块下插的俯冲带。
事实来源: [日本气象厅/产综研火山资料, 岛弧火山文献——待核对]
