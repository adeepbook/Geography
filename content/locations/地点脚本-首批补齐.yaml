    模块: 板块/离散/大陆裂谷
    参数:
      代表: 乞力马扎罗、尼拉贡戈
      关系: 张裂减压生岩浆
  - 事件: 可能裂成新海洋(进行中)
    模块: 板块/离散/大洋中脊
    参数:
      前景: 索马里板块持续远离
