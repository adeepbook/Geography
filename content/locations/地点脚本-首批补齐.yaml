区位: 南太平洋 · 澳大利亚东北陆架
类型标签: [气候与生物]            # 绿
一句话: 无数珊瑚虫世代堆骨成礁,海面随冰期反复升降,在陆架上叠出世界最大珊瑚礁。
形成时间线:
  - 事件: 陆架基底与老礁台
    模块: 古地理/海陆变迁
    参数:
      背景: 澳大利亚东北部浅海陆架
      老礁: 更新世礁体平台(待核对)
  - 事件: 珊瑚造礁(灰岩)
    模块: 外力/海岸/珊瑚礁 + 岩石/沉积/石灰岩
    参数:
      机制: 珊瑚虫骨骼世代堆积
      条件: 温暖清澈浅海
  - 事件: 冰期—间冰期海面升降
    模块: 古地理/冰期间冰期
    参数:
      冰期: 海面下降、礁体出露死亡
      间冰期: 海面回升、礁体向上追长
  - 事件: 现代堡礁成形
    模块: 外力/海岸/珊瑚礁
    参数:
