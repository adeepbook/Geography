# 地点脚本 · 按 M2 模板 · 状态:起草(待核对)
地点ID: GL-001
名称: 桂林喀斯特
坐标: [25.27, 110.29]
区位: 东亚 · 中国广西 · 漓江流域
类型标签: [喀斯特]                    # 钉子色:喀斯特绿

一句话: 一片古海底的巨厚石灰岩,被湿热季风的水一寸寸溶掉,剩下的就是峰林。

形成时间线:
  - 事件: 古海沉积巨厚灰岩
    模块: 岩石/沉积/石灰岩 + 古地理/海陆变迁
    参数:
      时代: 泥盆纪—石炭纪(约4亿—3亿年前,待核对)
      环境: 华南浅海碳酸盐台地
      厚度: 千米级(待核对)
  - 事件: 抬升出海,成为可溶的"原料"
    模块: 构造/整体抬升
    参数:
      背景: 中生代以来构造抬升
      结果: 灰岩出露地表,节理发育
  - 事件: 湿热水的长期溶蚀(进行中)
    模块: 风化/碳酸化溶蚀 + 外力/喀斯特/峰林天坑
    参数:
      气候: 亚热带季风,年降水约1900毫米(待核对)
      路径: 水沿节理下切—残余山体由峰丛趋向孤立峰林
      主营力时代: 新生代以来
  - 事件: 地下同步掏空
    模块: 外力/喀斯特/溶洞
    参数:
      代表: 芦笛岩等
      沉积: 石钟乳/石笋/石柱
      关系: 地表峰林与地下溶洞是同一过程的上下两半

垂直拆解:
  天上: [气候/季风, 气候/柯本分类(Cfa湿润亚热带), 充沛降水=溶蚀的"溶剂"]
  地面: [外力/喀斯特/峰林天坑, 漓江水系(既溶蚀又搬运), 峰丛洼地与峰林平原]
  地下: [岩石/沉积/石灰岩, 风化/碳酸化溶蚀(沿节理), 外力/喀斯特/溶洞, 地下河]

本地注解: >
  桂林的天际线其实是"减法"的结果:不是山长出来,而是山之间的岩石被水溶走了。
  峰丛(基座相连)与峰林(孤峰拔地)是同一过程的不同阶段与水文条件的产物。
  "桂林山水"的山与水互为因果:没有这么多水,溶不出这些山;没有灰岩,留不住这条
  清澈的漓江。曾是海底这一点,在灰岩中的海相化石里有直接证据。

事实来源: [中国地质科学院岩溶地质研究所资料, 华南泥盆纪碳酸盐台地文献, 世界自然遗产(中国南方喀斯特)申报材料——逐条核对后改状态]
状态: 起草
