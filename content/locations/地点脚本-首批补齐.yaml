地点ID: SX-001
名称: 长江三峡
坐标: [31.04, 109.88]
区位: 东亚 · 中国长江中游
类型标签: [流水]                  # 蓝
一句话: 河比山老——山慢慢隆起,长江保持原路下切,硬生生锯穿了褶皱山脉。
形成时间线:
  - 事件: 海相地层沉积
    模块: 岩石/沉积/石灰岩 + 古地理/海陆变迁
    参数:
      环境: 古浅海
      产物: 厚层灰岩等(三峡峡谷段多为灰岩)
  - 事件: 构造褶皱成山
    模块: 构造/背斜 + 构造/向斜
    参数:
      对象: 黄陵背斜等(待核对)
      结果: 岩层被挤成背斜向斜构成的山地
  - 事件: 区域抬升
    模块: 构造/整体抬升
    参数:
      背景: 新生代以来抬升
  - 事件: 先成河锯穿山脉(进行中)
    模块: 外力/流水/先成河 + 外力/流水/下切与峡谷
    参数:
      机制: 河早于山或与隆起同步,下切保持原道
      结果: 瞿塘/巫/西陵三峡
垂直拆解:
  天上: [气候/季风(亚热带湿润), 充沛径流供给下切动力]
  地面: [深切峡谷、背斜向斜构成的峰岭、长江干流]
  地下: [构造/背斜+向斜, 岩石/沉积/石灰岩, 外力/流水/先成河(下切剖面)]
本地注解: >
  三峡的反直觉之处:水似乎"违反常理"地横切山脉而非绕行——因为河比山先存在,
  山缓慢隆起的同时,河以同等速度向下切,守住了原来的河道(先成河)。
事实来源: [长江三峡地貌与构造研究——待核对(先成河成因尚有讨论)]
状态: 起草
