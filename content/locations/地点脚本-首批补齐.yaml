    参数:
      背景: 斯堪的纳维亚古老结晶岩与变质岩
  - 事件: 冰川刨蚀成U形谷
    模块: 外力/冰川/U形谷 + 古地理/冰期间冰期
    参数:
      时代: 第四纪多次冰期
      特点: 过度下切,谷底常低于海平面
  - 事件: 冰退、地壳回弹
    模块: 古地理/冰期间冰期
    参数:
      过程: 冰盖消融、陆地均衡回弹
