# 地点脚本 · 按 M2 模板 · 状态:起草(待核对)
地点ID: GC-001
名称: 科罗拉多大峡谷
坐标: [36.10, -112.10]
区位: 北美 · 美国亚利桑那州 · 科罗拉多高原
类型标签: [流水侵蚀, 沉积地层]        # 钉子色:流水蓝

一句话: 一条河切开一座抬升的高原,把近20亿年的地层翻成一本立着的书。

形成时间线:
  - 事件: 古老基底
    模块: 岩石/变质/区域变质
    参数:
      岩性: 毗湿奴片岩+花岗岩侵入
      时代: 元古宙(约17亿年前,待核对)
      背景: 古造山带根部
  - 事件: 大不整合
    模块: 构造/不整合面
    参数:
      缺失时长: 最长约十余亿年(待核对)
      含义: 漫长抬升剥蚀,记录被撕掉的篇章
  - 事件: 古生代层层沉积
    模块: 岩石/沉积/碎屑岩 + 岩石/沉积/石灰岩
    参数:
      序列: 砂岩—页岩—灰岩多旋回(寒武纪Tapeats砂岩→二叠纪Kaibab灰岩)
      环境: 浅海为主,间有海岸与风成沙漠
      产状: 近水平
  - 事件: 高原抬升
    模块: 构造/整体抬升
    参数:
      对象: 科罗拉多高原
      时代: 白垩纪末以来(拉拉米造山及其后,待核对)
      特点: 整体抬升、地层基本未褶皱
  - 事件: 河流下切(进行中)
    模块: 外力/流水/下切与峡谷
    参数:
      河流: 科罗拉多河
      起始: 约500–600万年前水系贯通(待核对)
      深度: 最深约1.6–1.8公里
      长度: 约446公里

垂直拆解:
  天上: [气候/副高与荒漠, 气候/地形雨影, 气候/海拔分带, 气候/季风(北美季风)]
  地面: [外力/流水/下切与峡谷, 外力/流水/河流阶地(局部), 旱生植被垂直分带]
  地下: [岩石/沉积/碎屑岩, 岩石/沉积/石灰岩, 构造/不整合面, 构造/节理, 岩石/变质/区域变质(谷底基底)]

本地注解: >
  北缘(约2500m)到谷底(约760m)近1700米落差,垂直叠出针叶林—半干旱松林—炎热荒漠
  约三个气候带;地层近水平、色带分明,是"地质年代表"最直观的实物版。
  谷底内峡谷壁立的深色片岩与上覆平整地层之间,就是著名的大不整合面。

事实来源: [USGS大峡谷地质资料, 美国国家公园管理局(NPS)地质页, 区域地质文献——逐条核对后改状态]
状态: 起草
