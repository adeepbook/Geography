  天上: [气候/洋流(北大西洋暖流), 气候/西风与温带气候, 多雨多雪]
  地面: [峡湾、U形谷、冰斗角峰、悬谷瀑布、冰碛]
  地下: [岩石/变质/区域变质(基底), 外力/冰川/U形谷(横剖面)]
本地注解: >
  峡湾=冰川U形谷+海水入侵。V形是河切的,U形是冰刨的——冰川以整个横截面磨蚀,
  把谷底切到海平面以下,冰退海进后便成深邃峡湾。
事实来源: [斯堪的纳维亚冰川地貌研究——待核对]
