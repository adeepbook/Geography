地点ID: HW-001
名称: 夏威夷
坐标: [19.6, -155.5]
区位: 太平洋中部 · 板块内部
类型标签: [火山与板块]            # 红
一句话: 一根近乎固定的地幔柱,把缓缓西移的太平洋板块烧出一串年龄递增的玄武岩岛。
形成时间线:
  - 事件: 地幔柱烧穿板块
    模块: 板块/板内热点
    参数:
      柱位: 近固定
      板块运动: 太平洋板块向西北
      证据: 夏威夷—皇帝海山链年龄向西北递增
  - 事件: 玄武岩盾状堆积
    模块: 岩石/火成/玄武岩 + 板块/火山/盾状火山
    参数:
      方式: 宁静溢流为主
      代表: 冒纳罗亚/基拉韦厄(活跃)
      景观: 熔岩原、熔岩隧道
  - 事件: 老岛熄灭、沉降、被蚀
    模块: 板块/板内热点
    参数:
      过程: 离开热点后下沉
      归宿: 海山→环礁(衔接珊瑚礁模块)
垂直拆解:
  天上: [气候/三圈环流(信风带), 气候/海拔分带, 迎风/背风差异(地形雨影)]
  地面: [盾状火山地貌, 熔岩原与黑沙滩, 迎风坡雨林—背风坡干旱]
  地下: [岩石/火成/玄武岩(层层叠置), 板块/板内热点(柱头通道)]
本地注解: >
  夏威夷的"奇"在于它远离任何板块边界,却火山活跃——答案是板内热点。
  是板块在动、热点近似不动:沿岛链向西北,岛越老、越低、越被蚀,直至沉为海山。
事实来源: [USGS夏威夷火山观测站, 热点与海山链文献——待核对]
状态: 起草
