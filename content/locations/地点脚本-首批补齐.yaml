  地面: [堡礁带、潟湖、珊瑚岛、礁后浅海]
  地下: [现代礁灰岩叠于更新世老礁之上, 陆架基底]
本地注解: >
  大堡礁是"生物+海面"的合作:珊瑚负责造,海面变化负责定高度。
  冰期海面下降会让礁体露出而死亡,间冰期上升它便向上追赶光线继续长——
  今天的礁主要是末次冰期后海侵以来长起来的。
