# 地点脚本 · 按 M2 模板 · 状态:起草(待核对)
地点ID: IS-001
名称: 冰岛
坐标: [64.90, -18.60]
区位: 北大西洋 · 大西洋中脊与北极圈之间
类型标签: [火山与板块, 冰川]          # 钉子色:火山红

一句话: 大洋中脊唯一大规模露出海面的地方——一座正在被拉开、同时被冰雕刻的玄武岩之岛。

形成时间线:
  - 事件: 中脊+热点叠加,岛屿出水
    模块: 板块/离散/大洋中脊 + 板块/板内热点
    参数:
      边界: 北美—欧亚板块分离(约每年2厘米,待核对)
      叠加: 冰岛地幔柱供应额外岩浆
      结果: 洋脊在此堆高出海面
      最老岩石: 约1400–1600万年(待核对)
  - 事件: 玄武岩层层堆积
    模块: 岩石/火成/玄武岩 + 板块/火山/盾状火山
    参数:
      方式: 裂隙式喷发为主+盾状/成层火山
      代表: 1783年拉基裂隙大喷发(待核对)
      景观: 熔岩原、柱状节理
  - 事件: 冰期全岛披冰
    模块: 古地理/冰期间冰期
    参数:
      时代: 第四纪
      现象: 冰盖覆盖与火山共存
      特产: 冰下喷发成平顶山(tuya)、冰川洪流
  - 事件: 持续被拉开(进行中)
    模块: 板块/离散/大陆裂谷(地表表现)
    参数:
      地点: 辛格韦德利裂谷带
      表现: 正断层崖与地堑
      速率: 厘米级/年

垂直拆解:
  天上: [气候/洋流(北大西洋暖流增温), 气候/西风与温带气候, 气候/海拔分带]
  地面: [熔岩原与火山群, 冰川与冰川河, 外力/冰川/U形谷, 地热区(温泉/间歇泉)]
  地下: [岩石/火成/玄武岩(层层叠置), 板块/离散/大洋中脊(裂谷轴), 岩浆系统与地热]

本地注解: >
  冰岛的关键不是"有火山",而是"为什么洋中脊在这里露出海面"——答案是中脊与地幔
  柱热点恰好叠加,岩浆供应量远超普通洋脊;岛屿东西两半分属两个板块,正以指甲
  生长般的速度互相远离。冰与火不是比喻:冰下喷发塑造了独有的平顶山地貌。

事实来源: [冰岛大学/气象局地学资料, 大西洋中脊与冰岛地幔柱文献——逐条核对后改状态]
状态: 起草
